schema_version: "1.0"
workflow:
  id: nb-brownfield-onboard
  name: "Nubo Brownfield Onboarding"
  version: "1.0.0"
  author: "Nubo"
  description: "Retrofit SDD governance onto an existing codebase"
  hooks_profile: arch-only

steps:
  - id: discover-codebase
    command: nb.nb-implement
    input:
      args: "reverse-engineer"

  - id: constitution
    command: nb.nb-constitution

  - id: arch-review
    command: nb.nb-review-arch

  - id: review-arch
    type: gate
    message: "Review architecture findings before documentation catch-up."
    options: [approve, reject]
    on_reject: abort

  - id: docs-catchup
    command: nb.nb-docs

  - id: specify-next
    command: nb.nb-specify
    input:
      args: "first-feature-on-governed-codebase"

  - id: plan
    command: nb.nb-plan

  - id: tasks
    command: nb.nb-tasks

  - id: implement
    command: nb.nb-implement

  - id: review-final
    type: gate
    message: "Final review after brownfield onboarding implementation."
    options: [approve, reject]
    on_reject: abort
