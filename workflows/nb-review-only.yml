schema_version: "1.0"
workflow:
  id: nb-review-only
  name: "Nubo Review Pipeline"
  version: "1.0.0"
  author: "Nubo"
  description: "Review + test pipeline for existing code"
  hooks_profile: none

steps:
  - id: review-code
    command: nb.nb-review-code

  - id: review-security
    command: nb.nb-review-security

  - id: arch-review
    command: nb.nb-review-arch
    continue_on_error: true

  - id: test
    command: nb.nb-test
    continue_on_error: true

  - id: analyze
    command: nb.nb-analyze

  - id: review-final
    type: gate
    message: "Approve review findings before closing the review pipeline."
    options: [approve, reject]
    on_reject: abort
