schema_version: "1.0"
workflow:
  id: nb-security-audit
  name: "Nubo Security Audit"
  version: "1.0.0"
  author: "Nubo"
  description: "Security hardening + static analysis pass"
  hooks_profile: none

steps:
  - id: review-security
    command: nb.nb-review-security

  - id: arch-review
    command: nb.nb-review-arch
    continue_on_error: true

  - id: review-code
    command: nb.nb-review-code
    continue_on_error: true

  - id: audit-gate
    type: gate
    message: "Security team sign-off required before closing the audit."
    options: [approve, reject]
    on_reject: abort
