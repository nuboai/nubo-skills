schema_version: "1.0"
workflow:
  id: nb-docs-catchup
  name: "Nubo Documentation Catch-up"
  version: "1.0.0"
  author: "Nubo"
  description: "Document existing codebase decisions and APIs"
  hooks_profile: none

steps:
  - id: discover
    command: nb.nb-implement
    input:
      args: "reverse-engineer"

  - id: docs
    command: nb.nb-docs

  - id: analyze
    command: nb.nb-analyze
    continue_on_error: true

  - id: docs-gate
    type: gate
    message: "Approve documentation catch-up before closing."
    options: [approve, reject]
    on_reject: abort
