schema_version: "1.0"
workflow:
  id: nb-hotfix
  name: "Nubo Hotfix"
  version: "1.0.0"
  author: "Nubo"
  description: "Fast path for small scoped fixes"
  hooks_profile: review-only

steps:
  - id: patch-spec
    command: nb.nb-specify
    input:
      args: "patch"

  - id: implement
    command: nb.nb-implement

  - id: review-code
    command: nb.nb-review-code

  - id: review-final
    type: gate
    message: "Approve hotfix before merge."
    options: [approve, reject]
    on_reject: abort
