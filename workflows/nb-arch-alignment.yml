schema_version: "1.0"
workflow:
  id: nb-arch-alignment
  name: "Nubo Architecture Alignment"
  version: "1.0.0"
  author: "Nubo"
  description: "Remediate architecture drift against constitution"
  hooks_profile: arch-only

steps:
  - id: constitution-check
    command: nb.nb-constitution

  - id: arch-review
    command: nb.nb-review-arch

  - id: plan-refactor
    command: nb.nb-plan
    input:
      args: "refactor"

  - id: tasks
    command: nb.nb-tasks

  - id: review-plan
    type: gate
    message: "Review the refactor plan before implementation."
    options: [approve, reject]
    on_reject: abort

  - id: implement
    command: nb.nb-implement

  - id: arch-review-post
    command: nb.nb-review-arch

  - id: review-final
    type: gate
    message: "Final review after architecture alignment."
    options: [approve, reject]
    on_reject: abort
