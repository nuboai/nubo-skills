schema_version: "1.0"
workflow:
  id: nb-greenfield
  name: "Nubo Greenfield Bootstrap"
  version: "1.0.0"
  author: "Nubo"
  description: "Bootstrap a governed project from an idea with no existing artifacts"
  hooks_profile: full

steps:
  - id: interview
    command: nb.nb-interview

  - id: constitution
    command: nb.nb-constitution

  - id: specify
    command: nb.nb-specify

  - id: clarify
    command: nb.nb-clarify

  - id: review-spec
    type: gate
    message: "Review the specification before planning."
    options: [approve, reject]
    on_reject: abort

  - id: plan
    command: nb.nb-plan

  - id: tasks
    command: nb.nb-tasks

  - id: review-plan
    type: gate
    message: "Review the plan before implementation."
    options: [approve, reject]
    on_reject: abort

  - id: implement
    command: nb.nb-implement

  - id: analyze
    command: nb.nb-analyze

  - id: converge
    command: nb.nb-converge

  - id: checklist
    command: nb.nb-checklist

  - id: review-final
    type: gate
    message: "Final review before optional deployment."
    options: [approve, reject]
    on_reject: abort

  - id: deploy
    command: nb.nb-deploy
    continue_on_error: true
