name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: chmod +x scripts/*.sh
      - run: python3 scripts/generate_skills.py
      - run: ./scripts/sync-upstream.sh
      - run: ./scripts/validate.sh
      - run: ./scripts/test_install.sh

  skillspector:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install SkillSpector
        run: pip install skillspector
      - name: Scan commands
        run: |
          if command -v skillspector >/dev/null 2>&1; then
            if [ -f .skillspector-baseline.yml ]; then
              skillspector scan commands/ --format sarif --baseline .skillspector-baseline.yml --output skillspector-report.sarif
            else
              skillspector scan commands/ --format sarif --output skillspector-report.sarif
            fi
          else
            echo "SkillSpector not available — failing CI" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: skillspector-report
          path: skillspector-report.sarif
          if-no-files-found: ignore
